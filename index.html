    ${tags ? '<br>' + tags : ''}${ig}
  </div>`;
  const marker = L.marker([gym.lat, gym.lng], { icon: createIcon(color) }).addTo(map).bindPopup(popup);
  marker.gymData = gym;
  markers.push(marker);
});

const dayOrder = ['wednesday', 'friday', 'saturday', 'sunday'];
const dayLabelsMap = { wednesday: 'Wednesday', friday: 'Friday', saturday: 'Saturday', sunday: 'Sunday' };
let activeDay = 'all', searchTerm = '', activeTags = new Set();

function fuzzyMatch(text, query) {
  if (!query) return true;
  text = text.toLowerCase();
  query = query.toLowerCase();
  // Exact substring match first
  if (text.includes(query)) return true;
  // Fuzzy: all query chars appear in order
  let qi = 0;
  for (let i = 0; i < text.length && qi < query.length; i++) {
    if (text[i] === query[qi]) qi++;
  }
  if (qi === query.length) return true;
  // Token match: every word in query matches start of some word in text
  const qWords = query.split(/\s+/).filter(Boolean);
  const tWords = text.split(/[\s\-&/,]+/).filter(Boolean);
  return qWords.length > 0 && qWords.every(qw => tWords.some(tw => tw.startsWith(qw)));
}

function matchGym(g) {
  const dayOk = activeDay === 'all' || g.day === activeDay;
  const searchOk = fuzzyMatch(g.name + ' ' + g.city, searchTerm);
  const tagOk = activeTags.size === 0 || (g.tags && g.tags.some(t => activeTags.has(t)));
  return dayOk && searchOk && tagOk;
}

function render() {
  const el = document.getElementById('schedule');
  let html = '';
  const days = activeDay === 'all' ? dayOrder : [activeDay];
  days.forEach(day => {
    const list = gyms.filter(g => g.day === day && matchGym(g));
    if (!list.length) return;
    html += `<div class="mb-6">
      <div class="flex items-center gap-2 px-3 py-2 rounded-xl mb-2 font-bold text-base sm:text-lg ${dayHeaderBg[day]}">
        ${dayLabelsMap[day]}
        <span class="text-xs sm:text-sm font-semibold opacity-70 bg-white/30 px-2 py-0.5 rounded-full">${list.length}</span>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 sm:gap-3">`;
    list.forEach(gym => {
      const tags = (gym.tags || []).map(t =>
        `<span class="text-[10px] sm:text-xs px-1.5 py-0.5 rounded-full font-semibold ${tagStyles[t] || ''}">${tagLabels[t] || t}</span>`
      ).join('');
      const ig = gym.ig
        ? `<a href="https://instagram.com/${gym.ig}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="inline-flex items-center gap-0.5 text-[11px] sm:text-xs font-semibold text-ig hover:underline mt-0.5">${igSvg}@${gym.ig}</a>`
        : '';
      html += `<div class="gym-card group bg-white rounded-xl p-3 sm:p-4 flex justify-between items-start shadow-sm border border-gray-100 hover:shadow-md hover:-translate-y-0.5 transition-all cursor-pointer border-l-4 ${dayBorderClass[day]}" data-lat="${gym.lat}" data-lng="${gym.lng}">
        <div class="min-w-0 flex-1">
          <h3 class="text-sm sm:text-[15px] font-semibold leading-tight truncate">${gym.name}</h3>
          <p class="text-xs sm:text-sm text-gray-500 mt-0.5">${gym.city}</p>
          ${tags ? `<div class="flex flex-wrap gap-1 mt-1">${tags}</div>` : ''}
          ${ig}
        </div>
        <div class="text-sm sm:text-base font-bold text-brand-500 whitespace-nowrap ml-3 mt-0.5">${gym.time}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  el.innerHTML = html || '<p class="text-center text-gray-400 py-8">No results found.</p>';

  markers.forEach(m => { matchGym(m.gymData) ? m.addTo(map) : map.removeLayer(m); });

  document.querySelectorAll('.gym-card').forEach(card => {
    card.addEventListener('click', () => {
      const lat = +card.dataset.lat, lng = +card.dataset.lng;
      map.setView([lat, lng], 13);
      markers.forEach(m => {
        if (Math.abs(m.gymData.lat - lat) < 0.005 && Math.abs(m.gymData.lng - lng) < 0.005) m.openPopup();
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

// Day filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('bg-brand-500', 'text-white');
      b.classList.add('bg-white', 'text-brand-500');
    });
    btn.classList.remove('bg-white', 'text-brand-500');
    btn.classList.add('bg-brand-500', 'text-white');
    activeDay = btn.dataset.day;
    render();
  });
  // Init styles
  if (btn.classList.contains('active')) {
    btn.classList.add('bg-brand-500', 'text-white');
  } else {
    btn.classList.add('bg-white', 'text-brand-500');
  }
});

// Tag filter buttons
document.querySelectorAll('.tag-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    const tag = btn.dataset.tag;
    if (activeTags.has(tag)) {
      activeTags.delete(tag);
      btn.classList.remove('!bg-purple-500', '!bg-pink-500', '!bg-indigo-500', '!bg-teal-500', '!text-white');
      btn.style.backgroundColor = '';
      btn.style.color = '';
    } else {
      activeTags.add(tag);
      const colors = { nogi: '#a855f7', women: '#ec4899', gi: '#6366f1', kids: '#14b8a6' };
      btn.style.backgroundColor = colors[tag];
      btn.style.color = 'white';
    }
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  render();
});

render();
</script>
</body>
</html>
